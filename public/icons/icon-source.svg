<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="#6366F1"/>

  <!-- Package icon -->
  <g transform="translate(96, 96)">
    <!-- Box outline -->
    <path
      d="M160 40 L296 96 L296 224 L160 280 L24 224 L24 96 Z"
      fill="none"
