    />

    <!-- Vertical center line -->
    <line
      x1="160"
      y1="152"
      x2="160"
      y2="280"
      stroke="white"
      stroke-width="18"
      stroke-linecap="round"
    />

    <!-- Small stripe accent (represents uniform) -->
